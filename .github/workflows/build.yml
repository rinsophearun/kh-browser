name: 🏗 Build KH Browser

on:
  push:
    tags: ['v*']
  workflow_dispatch:          # ← Manual trigger button in GitHub UI

jobs:
  # ══════════════════════════════════════════════════════
  #  Windows — EXE + Setup Installer
  # ══════════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows EXE + Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt6 pyinstaller requests cryptography Pillow

      - name: Generate icons
        run: python build_icons.py
        env:
          PYTHONUTF8: "1"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --clean --noconfirm `
            --name KHBrowser `
            --icon "assets\icon.ico" `
            --windowed `
            --add-data "assets;assets" `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import PyQt6.QtNetwork `
            --hidden-import cryptography `
            --hidden-import requests `
            --hidden-import main_window `
            --hidden-import dashboard_panel `
            --hidden-import groups_panel `
            --hidden-import profile_dialog `
            --hidden-import team_dialog `
            --hidden-import browser_launcher `
            --hidden-import storage `
            --hidden-import models `
            --hidden-import styles `
            --hidden-import rpa_dialog `
            --hidden-import batch_dialog `
            --hidden-import settings_dialog `
            --hidden-import api_dialog `
            --exclude-module tkinter `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --log-level WARN `
            main.py

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Build Setup Wizard (.exe installer)
        run: |
          New-Item -ItemType Directory -Force -Path installer_output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q installer.iss
        shell: pwsh

      - name: Show output files
        run: |
          echo "=== dist/ ==="
          dir dist\KHBrowser\ | Select-Object Name, Length
          echo "=== installer_output/ ==="
          dir installer_output\
        shell: pwsh

      - name: Upload Windows EXE (portable)
        uses: actions/upload-artifact@v4
        with:
          name: KHBrowser-Windows-Portable-EXE
          path: dist\KHBrowser\
          retention-days: 30

      - name: Upload Windows Setup Installer
        uses: actions/upload-artifact@v4
        with:
          name: KHBrowser-Windows-Setup-Installer
          path: installer_output\*.exe
          retention-days: 30

  # ══════════════════════════════════════════════════════
  #  macOS — .app + .dmg
  # ══════════════════════════════════════════════════════
  build-macos:
    name: 🍎 macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller requests cryptography Pillow

      - name: Generate icons
        run: python3 build_icons.py

      - name: Build .app + .dmg
        run: bash build_macos.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: KHBrowser-macOS-DMG
          path: dist/*.dmg
          retention-days: 30

  # ══════════════════════════════════════════════════════
  #  GitHub Release (on tag push only)
  # ══════════════════════════════════════════════════════
  release:
    name: 🚀 Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: KHBrowser-Windows-Setup-Installer
          path: release/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: KHBrowser-macOS-DMG
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KH Browser ${{ github.ref_name }}
          files: release/*
          body: |
            ## 🌐 KH Browser ${{ github.ref_name }}

            Professional Antidetect Browser Profile Manager

            ### 📦 Downloads

            | Platform | File | Install |
            |----------|------|---------|
            | 🪟 Windows | `KHBrowser-*-Setup-Windows.exe` | Double-click to install |
            | 🍎 macOS | `KHBrowser-*-macOS.dmg` | Drag to Applications |

            ### ✨ Features
            - Custom browser fingerprints per profile
            - Proxy configuration (HTTP/SOCKS5)
            - Real-time dashboard
            - Team management
            - RPA automation
            - Profile export/import (ZIP)
            - Cloud sync
