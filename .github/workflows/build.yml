name: Build KHBrowser

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── macOS Build ──────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller requests cryptography Pillow

      - name: Generate icons
        run: python3 build_icons.py

      - name: Build .app + .dmg
        run: bash build_macos.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: KHBrowser-macOS
          path: dist/*.dmg

  # ── Windows Build + Installer ────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install PyQt6 pyinstaller requests cryptography Pillow

      - name: Generate icons
        run: python build_icons.py

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --name KHBrowser `
            --icon assets\icon.ico --windowed `
            --add-data "assets;assets" `
            --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtNetwork `
            --hidden-import cryptography --hidden-import requests `
            --hidden-import main_window --hidden-import dashboard_panel `
            --hidden-import groups_panel --hidden-import profile_dialog `
            --hidden-import team_dialog --hidden-import browser_launcher `
            --hidden-import storage --hidden-import models `
            --hidden-import styles --hidden-import rpa_dialog `
            --hidden-import batch_dialog --hidden-import settings_dialog `
            --hidden-import api_dialog `
            --exclude-module tkinter --exclude-module matplotlib `
            --log-level WARN main.py

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Build Windows Installer (.exe Setup)
        run: |
          mkdir installer_output -Force
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Q installer.iss

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: KHBrowser-Windows
          path: |
            dist/KHBrowser.exe
            installer_output/*.exe

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KHBrowser-macOS/*.dmg
            KHBrowser-Windows/*.exe
          body: |
            ## KH Browser ${{ github.ref_name }}
            
            ### Downloads
            - **macOS**: `KHBrowser-*.dmg` — drag to Applications
            - **Windows**: `KHBrowser.exe` — double-click to run
